name: Deploy AWS ECS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_DIR: infra/aws/ecs
  TF_PROJECT_NAME: ${{ vars.TF_PROJECT_NAME || 'fastapi-ecs' }}
  TF_ENVIRONMENT: ${{ vars.TF_ENVIRONMENT || 'dev' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

jobs:
  deploy:
    if: vars.ENABLE_AWS_ECS_DEPLOY == 'true' && vars.AWS_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Compute deployment values
        run: |
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          image_tag="${GITHUB_SHA::12}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          repository_prefix="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/${TF_PROJECT_NAME}-${TF_ENVIRONMENT}"

          {
            echo "AWS_ACCOUNT_ID=${account_id}"
            echo "IMAGE_TAG=${image_tag}"
            echo "BACKEND_IMAGE=${repository_prefix}/backend:${image_tag}"
            echo "FRONTEND_BOOTSTRAP_IMAGE=${repository_prefix}/frontend:${image_tag}-bootstrap"
            echo "FRONTEND_IMAGE=${repository_prefix}/frontend:${image_tag}"
          } >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -input=false

      - name: Bootstrap ECR repositories
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -target=aws_ecr_repository.backend \
            -target=aws_ecr_repository.frontend \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${TF_PROJECT_NAME}" \
            -var="environment=${TF_ENVIRONMENT}" \
            -var="github_repository=${GITHUB_REPOSITORY}" \
            -var="backend_image=public.ecr.aws/docker/library/nginx:1" \
            -var="frontend_image=public.ecr.aws/docker/library/nginx:1"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "$BACKEND_IMAGE" \
            .
          docker push "$BACKEND_IMAGE"

      - name: Build and push bootstrap frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_URL=https://bootstrap.invalid \
            --build-arg NODE_ENV=production \
            -t "$FRONTEND_BOOTSTRAP_IMAGE" \
            .
          docker push "$FRONTEND_BOOTSTRAP_IMAGE"

      - name: Apply infrastructure with bootstrap frontend
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${TF_PROJECT_NAME}" \
            -var="environment=${TF_ENVIRONMENT}" \
            -var="github_repository=${GITHUB_REPOSITORY}" \
            -var="backend_image=${BACKEND_IMAGE}" \
            -var="frontend_image=${FRONTEND_BOOTSTRAP_IMAGE}"

      - name: Read API Gateway URL
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          api_url="$(terraform output -raw api_gateway_url)"
          echo "API_GATEWAY_URL=${api_url}" >> "$GITHUB_ENV"

      - name: Build and push final frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg "VITE_API_URL=${API_GATEWAY_URL}" \
            --build-arg NODE_ENV=production \
            -t "$FRONTEND_IMAGE" \
            .
          docker push "$FRONTEND_IMAGE"

      - name: Apply final frontend deployment
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${TF_PROJECT_NAME}" \
            -var="environment=${TF_ENVIRONMENT}" \
            -var="github_repository=${GITHUB_REPOSITORY}" \
            -var="backend_image=${BACKEND_IMAGE}" \
            -var="frontend_image=${FRONTEND_IMAGE}"

      - name: Print endpoints
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "Frontend: $(terraform output -raw frontend_url)"
          echo "API: $(terraform output -raw api_gateway_url)"
